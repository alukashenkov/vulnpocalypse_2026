name: Build & deploy CVE dashboard

on:
  schedule:
    # Hourly from 05:30 UTC. GitHub's scheduler is best-effort and drops ticks,
    # so we retry every hour; the gate stops once a build has deployed that day.
    - cron: "30 5-23 * * *"
  workflow_dispatch: {}

# Read-only (plus Pages); the gate reads run history to see if today already
# deployed. The run never commits to the repo.
permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

# Never run two builds at once; let a newer run supersede a queued one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Decide whether to build this tick. Scheduled runs retry hourly but deploy at
  # most once per day (stop after the first success). The dashboard also freezes
  # on the full-2026 snapshot: scheduled runs stop after 2027-01-01, and any run
  # in 2027 is pinned to the complete 2026 dataset via CVE_CUT_OFF_DATE=2026-12-31
  # (a naive year-boundary run would mishandle the "current month"). Manual runs
  # (workflow_dispatch) always proceed.
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
      cutoff: ${{ steps.check.outputs.cutoff }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          today=$(date -u +%Y-%m-%d)
          proceed=true
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            if [[ "$today" > "2027-01-01" ]]; then
              echo "Frozen on the full-2026 snapshot; skipping."
              proceed=false
            else
              # Stop retrying once a build has already deployed today.
              ids=$(gh api "repos/$REPO/actions/workflows/daily.yml/runs?per_page=50" \
                    --jq "[.workflow_runs[] | select(.created_at >= \"${today}T00:00:00Z\") | .id] | .[]")
              for id in $ids; do
                done_today=$(gh api "repos/$REPO/actions/runs/$id/jobs" \
                  --jq 'any(.jobs[]; .name == "build-and-deploy" and .conclusion == "success")')
                if [[ "$done_today" == "true" ]]; then
                  echo "A build already deployed today (run $id); stopping retries."
                  proceed=false
                  break
                fi
              done
            fi
          fi
          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"
          if [[ "$today" > "2026-12-31" ]]; then
            echo "cutoff=2026-12-31" >> "$GITHUB_OUTPUT"
          else
            echo "cutoff=" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Deterministic set/dict ordering so table row ties render the same daily.
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v7

      # The decompressed archive is ~5.4 GB; reclaim space as cheap insurance.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - uses: actions/configure-pages@v6

      - name: Build site
        env:
          DATA_DIR: ${{ runner.temp }}/data
          SITE_DIR: ${{ runner.temp }}/site
          VULNERS_API_KEY: ${{ secrets.VULNERS_API_KEY }}
          CVE_CUT_OFF_DATE: ${{ needs.gate.outputs.cutoff }}
        run: python -m src

      - name: Discard the downloaded archive
        if: always()
        run: rm -rf "${{ runner.temp }}/data"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/site

      - id: deployment
        uses: actions/deploy-pages@v5
