name: Build & deploy CVE dashboard

on:
  schedule:
    # Hourly from 05:30 to 20:30 UTC. GitHub's scheduler is best-effort: it drops
    # ticks and delivers others 1-2h late, so we retry every hour and the gate
    # stops once a build has deployed that day. The 05:30 tick is the first the
    # gate will pass, so an on-time delivery builds straight away. The run stops
    # at 20:30 so a delayed tick cannot arrive after midnight and claim the next
    # day's build slot.
    - cron: "30 5-20 * * *"
  workflow_dispatch: {}

# Read-only (plus Pages); the gate reads run history to see if today already
# deployed. The run never commits to the repo.
permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

# Never run two builds at once; let a newer run supersede a queued one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Decide whether to build this tick. Scheduled runs retry hourly but deploy at
  # most once per day (stop after the first success), and never before 05:00 UTC.
  # That floor is only about the day boundary, not data freshness: it keeps a
  # tick delivered after midnight from building pre-dawn and burning the new
  # day's slot. The dashboard also freezes on the full-2026 snapshot: scheduled
  # runs stop after 2027-01-01, and any run in 2027 is pinned to the 2026 set via
  # CVE_CUT_OFF_DATE=2026-12-31 (a naive year-boundary run would mishandle the
  # "current month"). Manual runs (workflow_dispatch) always proceed.
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
      cutoff: ${{ steps.check.outputs.cutoff }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          today=$(date -u +%Y-%m-%d)
          proceed=true
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            if [[ "$today" > "2027-01-01" ]]; then
              echo "Frozen on the full-2026 snapshot; skipping."
              proceed=false
            elif (( 10#$(date -u +%H) < 5 )); then
              # Cron alone cannot hold this line: a tick scheduled for 20:30 can
              # be delivered after midnight, and such a run would otherwise build
              # pre-dawn and burn the new day's slot.
              echo "Before 05:00 UTC; too early to build."
              proceed=false
            else
              # Stop retrying once a build has already deployed today.
              ids=$(gh api "repos/$REPO/actions/workflows/daily.yml/runs?per_page=50" \
                    --jq "[.workflow_runs[] | select(.created_at >= \"${today}T00:00:00Z\") | .id] | .[]")
              for id in $ids; do
                done_today=$(gh api "repos/$REPO/actions/runs/$id/jobs" \
                  --jq 'any(.jobs[]; .name == "build-and-deploy" and .conclusion == "success")')
                if [[ "$done_today" == "true" ]]; then
                  echo "A build already deployed today (run $id); stopping retries."
                  proceed=false
                  break
                fi
              done
            fi
          fi
          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"
          if [[ "$today" > "2026-12-31" ]]; then
            echo "cutoff=2026-12-31" >> "$GITHUB_OUTPUT"
          else
            echo "cutoff=" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Deterministic set/dict ordering so table row ties render the same daily.
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v7

      # The decompressed archive is ~5.4 GB; reclaim space as cheap insurance.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - uses: actions/configure-pages@v6

      - name: Build site
        env:
          DATA_DIR: ${{ runner.temp }}/data
          SITE_DIR: ${{ runner.temp }}/site
          VULNERS_API_KEY: ${{ secrets.VULNERS_API_KEY }}
          CVE_CUT_OFF_DATE: ${{ needs.gate.outputs.cutoff }}
        run: python -m src

      - name: Discard the downloaded archive
        if: always()
        run: rm -rf "${{ runner.temp }}/data"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/site

      - id: deployment
        uses: actions/deploy-pages@v5
